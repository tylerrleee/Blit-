name: Blit
options:
  bundleIdPrefix: com.blit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"

targets:
  Blit:
    type: application
    platform: iOS
    sources:
      - Blit
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blit.app
        SWIFT_EMIT_LOC_STRINGS: true
    info:
      path: Blit/Resources/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - blit
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UILaunchScreen: {}
        NSCameraUsageDescription: "Blit needs camera access to scan receipts"
        CFBundleDisplayName: Blit
        LSApplicationCategoryType: "public.app-category.finance"
    dependencies:
      - package: Supabase
        product: Supabase

  BlitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BlitTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blit.app.tests
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Blit
